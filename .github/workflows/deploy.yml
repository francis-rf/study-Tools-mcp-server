name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/study-Tools-mcp-server

            # Pull latest code
            git pull origin main

            # Stop and remove old container
            docker stop study-tools-mcp || true
            docker rm study-tools-mcp || true

            # Rebuild image
            docker build -t study-tools-mcp .

            # Run new container
            # No API key needed — fetched from Secrets Manager via EC2 IAM role
            # No volume mount needed — study materials downloaded from S3 at startup
            docker run -d \
              -p 8080:8080 \
              -e S3_BUCKET=study-tools-mcp-materials \
              -e AWS_REGION=us-east-1 \
              --name study-tools-mcp \
              --restart unless-stopped \
              study-tools-mcp
